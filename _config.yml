# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Easonshi's Space
subtitle: "O ever youthful!"
description: "Neo learner"
keywords:
  - playing
  - coding
  - study
  - runner
  - idiot
author: Easonshi
language: zh
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://lightblues.github.io/blog
root: /blog/
permalink: posts/:abbrlink/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# https://github.com/hexojs/hexo-generator-index
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ""
  per_page: 20
  order_by: -date
  pagination_dir: page
    # 第二页的路径就是 http://localhost:4000/page/2/#content-inner

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# https://github.com/hexojs/hexo-generator-category
category_generator:
  per_page: 20
  order_by: -date

# https://github.com/hexojs/hexo-generator-tag
tag_generator:
  per_page: 20
  order_by: -date

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: "mtime"

# Pagination
## Set per_page to 0 to disable pagination
per_page: 20
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''


# =================== plugins ===================
plugins:
  - hexo-generator-feed # RSS https://github.com/hexojs/hexo-generator-feed
  - hexo-generator-search # 本地搜索 https://github.com/wzpan/hexo-generator-search
  - hexo-generator-index # 文章置顶 https://github.com/hexojs/hexo-generator-index
  - hexo-abbrlink # 数字链接 https://github.com/rozbo/hexo-abbrlink
  # - hexo-renderer-kramed    # https://www.npmjs.com/package/hexo-renderer-kramed
  - hexo-offline # WPA
  - hexo-wordcount # 字数统计 https://github.com/willin/hexo-wordcount
  - hexo-butterfly-douban # https://github.com/jerryc127/butterfly-plugins/tree/main/hexo-butterfly-douban
  - hexo-generator-sitemap # 生成 sitemap
  - hexo-renderer-pandoc
  # - hexo-butterfly-artitalk # 说说，主题自带 https://github.com/jerryc127/butterfly-plugins/tree/main/hexo-butterfly-artitalk
  # ====== 默认有的插件
  - hexo-generator-archive # https://github.com/hexojs/hexo-generator-archive

# RSS https://github.com/hexojs/hexo-generator-feed
feed:
  type: atom
  path: atom.xml
  limit: 20

# 本地搜索 https://github.com/wzpan/hexo-generator-search
search:
  path: search.xml
  field: post
  content: true
  template: "" # ./search.xml

# 数字链接 https://github.com/rozbo/hexo-abbrlink
abbrlink:
  alg: crc32 #support crc16(default) and crc32
  rep: hex #support dec(default) and hex
  drafts: false #(true)Process draft,(false)Do not process draft. false(default)
  # Generate categories from directory-tree
  # depth: the max_depth of directory-tree you want to generate, should > 0
  auto_category:
    enable: true #true(default)
    depth: #3(default)
    over_write: false
  auto_title: false #enable auto title, it can auto fill the title by path
  auto_date: false #enable auto date, it can auto fill the date by time today
  force: false #enable force mode,in this mode, the plugin will ignore the cache, and calc the abbrlink for every post even it already had abbrlink.

# 豆瓣 https://github.com/jerryc127/butterfly-plugins/tree/main/hexo-butterfly-douban
# 还是不要 builtin，这个时时渲染的时候都要执行，调试其他文件的时候要等好久；反正书+电影模块不需要调试了，每次deploy的时候记得 `hexo douban` 一下
douban:
  user: easonshi99
  builtin: false # false 需要在 hexo g 後再運行 `hexo douban`
  book:
    title: "Books"
    quote: "The thousand faces of the world..."
    meta: true
    comments: true
    top_img: https://cloud.easonsi.site/img/Ukiyo-e/ukiyo-e-00007.jpg
    aside: true
    path: books
    limit:
  movie:
    title: "Movies"
    quote: "且将新火试新茶"
    meta: true
    comments: true
    top_img: https://cloud.easonsi.site/img/Ukiyo-e/ukiyo-e-00008.jpg
    aside: true
    path: movies
    limit:
  # game:
  #   title: 'This is my game title'
  #   quote: 'This is my game quote'
  #   meta: true
  #   comments: true
  #   top_img:
  #   aside: true
  #   path: games
  #   limit:
  timeout: 10000

# https://github.com/hexojs/hexo-generator-sitemap
sitemap:
  path: sitemap.xml
  template: # ./sitemap_template.xml
  rel: false
  tags: true
  categories: true

# see https://artitalk.js.org/
artitalk:
  enable: true
  appId: "Jghc9UtsSR6TniTz8qkdPdQm-MdYXbMMI"
  appKey: "WKB2zmkywx7bO8FPpegtkbP3"
  path:
  js:
  option:
  front_matter:

# hexo-generator-archive
archive_generator:
  enabled: true
  per_page: 20 # 10
  yearly: true
  monthly: true
  daily: false
  order_by: -date

# https://github.com/wzpan/hexo-renderer-pandoc
# 另外需要配合主题中将 mathjax 打开
pandoc:
  filters:
  extra:
  template:
  meta:
  mathEngine:

